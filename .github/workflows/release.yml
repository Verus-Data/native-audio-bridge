name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: macos-14
    if: "!contains(github.event.head_commit.message, 'chore(release)')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install semantic-release and plugins
        run: npm install -g semantic-release @semantic-release/commit-analyzer @semantic-release/release-notes-generator @semantic-release/exec @semantic-release/git @semantic-release/github

      - name: Build release binary
        run: swift build -c release

      - name: Create distribution tarball
        run: |
          mkdir -p dist
          cp .build/release/NativeAudioBridge dist/
          VERSION=$(semantic-release --dry-run 2>&1 | grep -oP 'Published release \K[0-9]+\.[0-9]+\.[0-9]+' || true)
          TAG=${VERSION:-${{ github.sha }}}
          tar -czf native-audio-bridge-${TAG}.tar.gz -C dist NativeAudioBridge

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: semantic-release
