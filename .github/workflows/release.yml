name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install semantic-release
        run: npm install -g semantic-release

      - name: Build release binary
        run: swift build -c release

      - name: Create distribution tarball
        run: |
          mkdir -p dist
          cp .build/release/NativeAudioBridge dist/
          tar -czf native-audio-bridge-${{ github.sha }}.tar.gz -C dist NativeAudioBridge

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx semantic-release

      - name: Bump version in Package.swift and Version.swift
        if: env.SEMANTIC_RELEASE_NEXT_VERSION != ''
        run: |
          VERSION="${SEMANTIC_RELEASE_NEXT_VERSION}"
          sed -i '' "s/let currentVersion = \".*\"/let currentVersion = \"${VERSION}\"/" Package.swift
          sed -i '' "s/public static let current = \".*\"/public static let current = \"${VERSION}\"/" Sources/NativeAudioBridge/Version.swift
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Package.swift Sources/NativeAudioBridge/Version.swift
          git commit -m "chore(release): bump version to ${VERSION} [skip ci]"
          git push